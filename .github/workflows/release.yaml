name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      pre_release:
        description: 'Enable pre-release mode (skip crates.io publishing, create draft pre-release)'
        required: false
        default: false
        type: boolean

permissions: read-all

jobs:
  publish:
    if: github.event.inputs.pre_release != 'true'
    name: 'Publish'
    uses: ./.github/workflows/publish_template.yaml
  release:
    needs: [publish]
    name: 'Release'
    uses: ./.github/workflows/release_template.yaml
    with:
      pre_release: ${{ github.event.inputs.pre_release == 'true' || false }}
